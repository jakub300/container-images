name: Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Add more image folders here.
        image:
          - name: msb-rails-devcontainer
            folder: msb-rails-devcontainer
            dockerfile: ./msb-rails-devcontainer/.devcontainer/Dockerfile
            image: container-images/msb-rails-devcontainer
            builder: devcontainer
          - name: msb-wordpress-devcontainer
            folder: msb-wordpress-devcontainer
            dockerfile: ./msb-wordpress-devcontainer/.devcontainer/Dockerfile
            image: container-images/msb-wordpress-devcontainer
            builder: devcontainer
          - name: msb-git-hardlink-corruption-repro
            folder: msb-git-hardlink-corruption-repro
            dockerfile: ./msb-git-hardlink-corruption-repro/Dockerfile
            image: container-images/msb-git-hardlink-corruption-repro
            builder: docker

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image ref
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${{ matrix.image.image }}" >> "$GITHUB_OUTPUT"

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Devcontainer tags
        id: devcontainer-tags
        if: matrix.image.builder == 'devcontainer'
        shell: bash
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          printf 'tags=%s\n' "$(printf '%s\n' "$TAGS" | sed 's/^.*://' | paste -sd, -)" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v7
        if: matrix.image.builder == 'docker'
        with:
          context: ./${{ matrix.image.folder }}
          file: ${{ matrix.image.dockerfile }}
          build-contexts: |
            shared=./shared
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}

      - uses: devcontainers/ci@v0.3
        if: matrix.image.builder == 'devcontainer'
        with:
          subFolder: ${{ matrix.image.folder }}
          imageName: ${{ steps.image.outputs.name }}
          imageTag: ${{ steps.devcontainer-tags.outputs.tags }}
          platform: linux/amd64,linux/arm64
          push: always
          cacheFrom: type=gha,scope=${{ matrix.image.name }}
          cacheTo: type=gha,mode=max,scope=${{ matrix.image.name }}
